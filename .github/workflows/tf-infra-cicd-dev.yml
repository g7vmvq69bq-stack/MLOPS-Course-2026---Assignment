name: Infrastructure CI/CD – dev

# Triggers on PRs that touch terraform/ files, or manually
on:
  pull_request:
    branches: ["main"]
    paths:
      - "terraform/**"
  workflow_dispatch:

jobs:
  terraform-plan-apply:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    # WHY permissions: issues: write?
    # The manual-approval action posts a GitHub Issue asking for a review.
    # Without this permission the workflow token cannot create issues → fails.
    permissions:
      issues: write
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-west-3

      - name: Terraform Format check
        run: terraform fmt -check -recursive
        continue-on-error: true

      - name: Terraform Init
        run: terraform init --backend-config="backends/dev.conf"

      - name: Terraform Validate
        run: terraform validate -no-color

      # Plan is saved to a file so the EXACT same plan is applied after approval.
      # WHY save the plan? If someone changes the console manually between plan
      # and apply, applying a stale plan could overwrite their change unexpectedly.
      - name: Terraform Plan
        run: terraform plan -no-color --var-file="environments/dev.tfvars" -out=plan.tfout

      # ── MANUAL APPROVAL GATE ─────────────────────────────────────────────────
      # WHY: The four-eyes principle — no infrastructure change reaches production
      # without a human reviewing the plan first. This prevents accidents.
      # The action opens a GitHub Issue tagged with the approver's username.
      # Reply "approved" on that issue to continue; "denied" to stop.
      - name: Manual Approval
        uses: trstringer/manual-approval@v1
        timeout-minutes: 60
        with:
          secret: ${{ github.token }}
          approvers: g7vmvq69bq-stack
          issue-title: "🚀 Approve Terraform Plan – dev"
          issue-body: |
            A Terraform plan is waiting for your approval before being applied to **dev**.

            Review the plan output in the workflow run above, then reply to this issue:
            - **approved** → apply the plan
            - **denied** → cancel the deployment
          exclude-workflow-initiator-as-approver: false

      # Apply uses the saved plan file — exactly what was approved, nothing more.
      - name: Terraform Apply
        run: terraform apply -auto-approve plan.tfout
